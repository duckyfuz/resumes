name: Destroy Infrastructure

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set PR Number and State Key
        id: set_outputs
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
            echo "STATE_KEY=resume-hosting-tf-key-pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          else
            # For manual dispatch, we default to production state unless you want to pass a PR number
            # For now, let's assume manual dispatch is for cleaning up production if needed
            echo "PR_NUMBER=" >> $GITHUB_ENV
            echo "STATE_KEY=resume-hosting-tf-key" >> $GITHUB_ENV
          fi

      - name: Destroy Terraform changes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_pr_number: ${{ env.PR_NUMBER }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init -backend-config="key=${{ env.STATE_KEY }}"
          terraform destroy --auto-approve
        working-directory: ./terraform
