name: Destroy Infrastructure

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set PR Number and State Key
        id: set_outputs
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
            echo "WS_NAME=${{ vars.PROJECT_NAME }}-pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          else
            echo "PR_NUMBER=" >> $GITHUB_ENV
            echo "WS_NAME=${{ vars.PROJECT_NAME }}" >> $GITHUB_ENV
          fi

      - name: Destroy Terraform changes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_pr_number: ${{ env.PR_NUMBER }}
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: |
          # Create workspace via API if it doesn't exist (safety)
          curl --header "Authorization: Bearer ${{ secrets.TF_API_TOKEN }}" \
               --header "Content-Type: application/vnd.api+json" \
               --request POST \
               --data "{\"data\":{\"attributes\":{\"name\":\"${{ env.WS_NAME }}\",\"execution-mode\":\"local\"},\"type\":\"workspaces\"}}" \
               https://app.terraform.io/api/v2/organizations/${{ vars.TF_ORGANIZATION }}/workspaces || true

          sed -i "s/TF_ORGANIZATION_PLACEHOLDER/${{ vars.TF_ORGANIZATION }}/g" main.tf
          sed -i "s/RESUME_HOSTING_WORKSPACE_PLACEHOLDER/${{ env.WS_NAME }}/g" main.tf
          terraform init
          terraform destroy --auto-approve

          # Delete workspace via API after successful destroy
          echo "Deleting Terraform workspace: ${{ env.WS_NAME }}"
          curl --silent --fail --show-error --location \
               --header "Authorization: Bearer ${{ secrets.TF_API_TOKEN }}" \
               --header "Content-Type: application/vnd.api+json" \
               --request DELETE \
               "https://app.terraform.io/api/v2/organizations/${{ vars.TF_ORGANIZATION }}/workspaces/${{ env.WS_NAME }}" || echo "Workspace deletion failed or already deleted"
        working-directory: ./terraform
