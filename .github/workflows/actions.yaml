name: Deploy Resume

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          compiler: pdflatex

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Extract Resume to JSON
        run: |
          python extraction/main.py resume.tex

      - name: Verify Builds
        run: |
          test -f resume.pdf || (echo "resume.pdf not found!" && exit 1)
          test -f resume.json || (echo "resume.json not found!" && exit 1)

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Apply Terraform changes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
        run: |
          terraform init
          terraform apply --auto-approve
        working-directory: ./terraform

      - name: Create Public Directory
        run: |
          mkdir public
          cp resume.pdf public/
          cp resume.json public/
          cp resume.json public/export.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ vars.PROJECT_NAME }}
          directory: "public"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
