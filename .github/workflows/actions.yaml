name: Deploy Infrastructure

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build_resume:
    name: LaTeX Build and JSON Extraction
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          compiler: pdflatex

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Extract Resume to JSON
        run: |
          python extraction/main.py resume.tex

      - name: Verify Builds
        run: |
          test -f resume.pdf || (echo "resume.pdf not found!" && exit 1)
          test -f resume.json || (echo "resume.json not found!" && exit 1)

      - name: Upload Resume Assets
        uses: actions/upload-artifact@v4
        with:
          name: resume-assets
          path: |
            resume.pdf
            resume.json

  manage_infrastructure:
    name: Terraform Infrastructure Management
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.set_outputs.outputs.project_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set PR Number
        id: set_outputs
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
            echo "project_name=${{ vars.PROJECT_NAME }}-pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "TF_WORKSPACE=${{ vars.PROJECT_NAME }}-pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          else
            echo "PR_NUMBER=" >> $GITHUB_ENV
            echo "project_name=${{ vars.PROJECT_NAME }}" >> $GITHUB_OUTPUT
            echo "TF_WORKSPACE=${{ vars.PROJECT_NAME }}" >> $GITHUB_ENV
          fi

      - name: Apply Terraform changes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
          TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
          TF_VAR_pr_number: ${{ env.PR_NUMBER }}
          TF_VAR_branch_name: ${{ github.head_ref || github.ref_name }}
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: |
          terraform init
          terraform workspace select -or-create ${{ env.TF_WORKSPACE }}
          terraform apply --auto-approve
        working-directory: ./terraform


  deploy_to_pages:
    name: Cloudflare Pages Deployment
    needs: [build_resume, manage_infrastructure]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Resume Assets
        uses: actions/download-artifact@v4
        with:
          name: resume-assets

      - name: Create Public Directory
        run: |
          mkdir public
          cp resume.pdf public/
          cp resume.json public/
          cp resume.json public/export.json
          echo "/ /resume.pdf 302" > public/_redirects

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ needs.manage_infrastructure.outputs.project_name }}
          directory: "public"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref || github.ref_name }}
